name: Continuous Integration Workflow

on: [push, pull_request, workflow_dispatch]

jobs:
  ci:
    runs-on: ubuntu-latest
    container: ghcr.io/ootmm/toolchain:1.4
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Mark the directory as safe
        run: git config --global --add safe.directory $PWD

      - name: Determine Deployment Type
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "DEPLOY_TYPE=stable" >> $GITHUB_ENV
            echo "VERSION=${{ github.ref_name }}" >> $GITHUB_ENV
            echo "ENV_KEYS=${{ github.ref_name }},stable" >> $GITHUB_ENV
            echo "NX_CMD=run-many" >> $GITHUB_ENV
          elif [[ "${{ github.ref }}" == refs/heads/master ]]; then
            echo "DEPLOY_TYPE=dev" >> $GITHUB_ENV
            short_sha=$(echo ${{ github.sha }} | cut -c1-7)
            echo "VERSION=dev" >> $GITHUB_ENV
            echo "VERSION_SUFFIX=${short_sha}" >> $GITHUB_ENV
            echo "ENV_KEYS=dev" >> $GITHUB_ENV
            echo "NX_CMD=affected" >> $GITHUB_ENV
          elif [[ "${{ github.ref }}" == refs/heads/preview/* ]]; then
            echo "DEPLOY_TYPE=preview" >> $GITHUB_ENV
            short_sha=$(echo ${{ github.sha }} | cut -c1-7)
            branch_name=$(echo "${{ github.ref_name }}" | sed 's/preview\///' | sed 's/[^a-zA-Z0-9-]/-/g')
            echo "VERSION=preview-${branch_name}" >> $GITHUB_ENV
            echo "VERSION_SUFFIX=${short_sha}" >> $GITHUB_ENV
            echo "ENV_KEYS=preview-${branch_name},preview" >> $GITHUB_ENV
            echo "NX_CMD=run-many" >> $GITHUB_ENV
          else
            echo "DEPLOY_TYPE=none" >> $GITHUB_ENV
            echo "NX_CMD=affected" >> $GITHUB_ENV
          fi

      - name: Setup
        run: ./scripts/setup.sh

      - name: Find references for NX
        if: ${{ env.NX_CMD != 'run-many' }}
        uses: nrwl/nx-set-shas@v4
        with:
          main-branch-name: master

      - name: Test
        run: pnpm nx ${NX_CMD} -t test --prod

      - name: Build
        run: pnpm nx ${NX_CMD} -t build --prod

      - name: Configure AWS
        if: ${{ github.event_name == 'push' && env.DEPLOY_TYPE != 'none' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Lock for Deploy
        if: ${{ github.event_name == 'push' && env.DEPLOY_TYPE != 'none' }}
        uses: ahmadnassri/action-workflow-queue@v1

      - name: Deploy
        if: ${{ github.event_name == 'push' && env.DEPLOY_TYPE != 'none' }}
        run: pnpm nx ${NX_CMD} -t deploy --prod
        env:
          S3_BUCKET: ${{ vars.S3_BUCKET }}
          NETLIFY_SITE_ID_WEB: ${{ secrets.NETLIFY_SITE_ID_WEB }}
          NETLIFY_SITE_ID_STATIC: ${{ secrets.NETLIFY_SITE_ID_STATIC }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}

      - name: Build Desktop
        if: ${{ github.event_name == 'push' && (env.DEPLOY_TYPE == 'stable' || env.DEPLOY_TYPE == 'dev') }}
        run: pnpm nx run @ootmm/desktop:build --prod

      - name: Upload Desktop Artifacts (dev)
        if: ${{ github.event_name == 'push' && env.DEPLOY_TYPE == 'dev' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev
          name: Development Build - ${{ github.sha }}
          prerelease: true
          make_latest: true
          files: packages/desktop/dist/ootmm-*.zip

      - name: Upload Desktop to Release
        if: ${{ github.event_name == 'push' && env.DEPLOY_TYPE == 'stable' }}
        uses: softprops/action-gh-release@v2
        with:
          files: packages/desktop/dist/ootmm-*.zip
